<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoCineHD — Ver Anuncio</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Ad network tag — paste your script tag here -->
  <script>(function(d,z,s){s.src='https://'+d+'/401/'+z;try{(document.body||document.documentElement).appendChild(s)}catch(e){}})('vaugroar.com',10827850,document.createElement('script'))</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 0;
    }
    #poster-wrap { margin-bottom: 16px; }
    .poster {
      width: 130px;
      height: 195px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: block;
    }
    .poster-placeholder {
      width: 130px;
      height: 195px;
      border-radius: 12px;
      background: #1e2736;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }
    #content-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      max-width: 320px;
      line-height: 1.3;
    }
    .subtitle {
      font-size: 12px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 20px;
    }
    #countdown-bar {
      width: 100%;
      max-width: 360px;
      height: 5px;
      background: #161b22;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, #e50914, #ff4d4d);
      width: 100%;
      border-radius: 3px;
      transition: width 0.1s linear;
    }
    #countdown-text {
      font-size: 13px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 20px;
      min-height: 20px;
    }
    #btn-ad, #btn-watch {
      width: 100%;
      max-width: 360px;
      padding: 15px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }
    #btn-ad  { background: linear-gradient(135deg, #1a73e8, #1558b0); }
    #btn-watch { background: linear-gradient(135deg, #e50914, #c40812); }
    #btn-ad:active, #btn-watch:active { opacity: 0.85; }
    #status {
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      min-height: 24px;
      margin-top: 12px;
    }
    .success { color: #3fb950; }
    .error { color: #f85149; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="poster-wrap"></div>
  <div id="content-title">Cargando...</div>
  <div class="subtitle">Ve el anuncio para desbloquear el contenido</div>

  <!-- Estado 1: botón inicial -->
  <button id="btn-ad" onclick="startAd()">📢 Ver Anuncio</button>

  <!-- Estado 2: countdown (oculto al inicio) -->
  <div id="countdown-wrap" style="display:none; width:100%; max-width:360px;">
    <div id="countdown-bar"><div id="countdown-fill"></div></div>
    <div id="countdown-text">Espera <span id="cd-num">5</span>s...</div>
  </div>

  <!-- Estado 3: botón ver contenido (oculto al inicio) -->
  <button id="btn-watch" style="display:none;" onclick="sendContent()">▶️ Ver contenido</button>

  <div id="status"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params      = new URLSearchParams(window.location.search);
    const userId      = params.get("user_id");
    const contentId   = params.get("content_id");
    const contentType = params.get("content_type");
    const title       = params.get("title") || "Contenido";
    const poster      = params.get("poster");

    document.getElementById("content-title").textContent = title;

    const posterWrap = document.getElementById("poster-wrap");
    if (poster) {
      const img = document.createElement("img");
      img.className = "poster";
      img.src = poster;
      img.onerror = () => img.replaceWith(makePlaceholder());
      posterWrap.appendChild(img);
    } else {
      posterWrap.appendChild(makePlaceholder());
    }

    function makePlaceholder() {
      const d = document.createElement("div");
      d.className = "poster-placeholder";
      d.textContent = contentType === "movie" ? "🎬" : "📺";
      return d;
    }

    // ── Estado 1 → 2: usuario toca "Ver Anuncio" ─────────────────────
    function startAd() {
      const btnAd = document.getElementById("btn-ad");
      btnAd.disabled = true;
      btnAd.textContent = "⏳ Cargando anuncio...";

      function tryRewarded(retries) {
        if (typeof show_10827850 === 'function') {
          // Rewarded interstitial — promesa resuelve cuando el usuario termina
          show_10827850()
            .then(() => {
              btnAd.style.display = "none";
              document.getElementById("countdown-wrap").style.display = "none";
              showWatchButton();
            })
            .catch(() => {
              // Ad falló o fue cerrado — igual dejamos ver el contenido
              btnAd.style.display = "none";
              document.getElementById("countdown-wrap").style.display = "none";
              showWatchButton();
            });
        } else if (retries > 0) {
          setTimeout(() => tryRewarded(retries - 1), 200);
        } else {
          // Script no cargó — fallback countdown de 5s
          btnAd.style.display = "none";
          document.getElementById("countdown-wrap").style.display = "block";
          startFallbackCountdown();
        }
      }
      tryRewarded(15);
    }

    // ── Fallback: countdown si el script de anuncios no cargó ────────
    function startFallbackCountdown() {
      const AD_SECONDS = 5;
      let remaining = AD_SECONDS;
      const fill = document.getElementById("countdown-fill");
      const num  = document.getElementById("cd-num");
      num.textContent = AD_SECONDS;
      const iv = setInterval(() => {
        remaining -= 0.1;
        fill.style.width = Math.max(0, (remaining / AD_SECONDS) * 100) + "%";
        num.textContent  = Math.max(0, Math.ceil(remaining));
        if (remaining <= 0) {
          clearInterval(iv);
          document.getElementById("countdown-wrap").style.display = "none";
          showWatchButton();
        }
      }, 100);
    }

    // ── Estado 2 → 3: mostrar botón de contenido ─────────────────────
    function showWatchButton() {
      const labels = { movie: "🎬 Ver Película", ep: "📺 Ver Episodio" };
      const btn = document.getElementById("btn-watch");
      btn.textContent = labels[contentType] || "▶️ Ver contenido";
      btn.style.display = "block";
    }

    // ── Estado 3: usuario toca "Ver Película/Episodio" ────────────────
    function sendContent() {
      const btn = document.getElementById("btn-watch");
      btn.disabled = true;
      btn.textContent = "⏳ Enviando...";

      fetch("/api/ad-completed", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id:      parseInt(userId, 10),
          content_id:   parseInt(contentId, 10),
          content_type: contentType
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === "ok") {
          btn.style.display = "none";
          document.getElementById("status").innerHTML =
            '<span class="success">✅ Enviado al chat</span>';
          setTimeout(() => tg.close(), 2000);
        } else {
          btn.disabled = false;
          btn.textContent = "🔄 Reintentar";
          document.getElementById("status").innerHTML =
            '<span class="error">❌ Error. Toca de nuevo.</span>';
        }
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = "🔄 Reintentar";
        document.getElementById("status").innerHTML =
          '<span class="error">❌ Error de conexión.</span>';
      });
    }
  </script>
</body>
</html>
