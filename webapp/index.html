<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CineStelar – Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: hsl(257, 40%, 4%);
      --surface: hsl(257, 40%, 8%);
      --surface2: hsl(257, 40%, 12%);
      --accent: hsl(220, 90%, 70%);
      --accent2: hsl(257, 80%, 65%);
      --pink: hsl(330, 80%, 65%);
      --text: hsl(257, 20%, 90%);
      --text-muted: hsl(257, 20%, 60%);
      --card-bg: hsl(257, 40%, 10%);
      --border: hsl(257, 40%, 20%);
      --star: #fbbf24;
      --radius: 0.75rem;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --primary: hsl(257, 80%, 65%);
      --glow-primary: hsl(257, 80%, 75%);
      --glow-accent: hsl(220, 90%, 70%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Poppins', sans-serif; overflow-x: hidden;
    }

    /* ── Background effects ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background: radial-gradient(ellipse 80% 80% at 50% -20%, hsla(257,80%,65%,0.12), transparent);
      pointer-events: none;
    }
    .orb {
      position: fixed; border-radius: 50%; opacity: 0.2;
      mix-blend-mode: screen; filter: blur(80px);
      pointer-events: none; z-index: -1;
    }
    .orb-1 { width: 320px; height: 320px; background: var(--primary); top: 15%; left: 10%; animation: float-orb-1 22s infinite ease-in-out; }
    .orb-2 { width: 260px; height: 260px; background: var(--accent); bottom: -5%; right: -3%; animation: float-orb-2 20s infinite ease-in-out; }
    .orb-3 { width: 200px; height: 200px; background: var(--surface2); top: 40%; right: 15%; animation: float-orb-3 18s infinite ease-in-out; }

    @keyframes float-orb-1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
    @keyframes float-orb-2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,25px)} }
    @keyframes float-orb-3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,35px)} }

    /* ── Glow text ── */
    .glow-text {
      text-shadow: 0 0 8px hsla(257,80%,65%,0.5), 0 0 20px hsla(220,90%,70%,0.3);
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: hsla(257, 40%, 4%, 0.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid hsla(257, 40%, 20%, 0.5);
      padding: 14px 16px 0;
    }
    .logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px; letter-spacing: -0.3px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 10px 40px 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.9rem;
      font-family: 'Poppins', sans-serif; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px hsla(220,90%,70%,0.15);
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.1rem; display: none; line-height: 1;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; padding-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 8px 18px; border-radius: 30px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: all .25s ease; white-space: nowrap;
    }
    .tab:hover { border-color: var(--primary); color: var(--text); }
    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent; color: #fff;
      box-shadow: 0 0 16px hsla(257,80%,65%,0.3);
    }

    /* ── Main content ── */
    main { padding: 0 12px 100px; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      padding-top: 8px;
    }

    /* ── Card ── */
    .card {
      position: relative; border-radius: var(--radius);
      overflow: visible; cursor: pointer;
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .card:hover { transform: scale(1.05) rotate(-1deg); z-index: 2; }
    .card:active { transform: scale(0.97); }

    /* Card glow effect */
    .card::before {
      content: ''; position: absolute; inset: -4px;
      border-radius: calc(var(--radius) + 4px);
      background: radial-gradient(circle at 50% 50%, var(--glow-primary), var(--glow-accent));
      opacity: 0; transition: opacity .4s ease; z-index: -1;
      filter: blur(14px);
    }
    .card:hover::before { opacity: 0.55; }

    .card-inner {
      position: relative; width: 100%; aspect-ratio: 2/3;
      border-radius: var(--radius); overflow: hidden;
      background: var(--card-bg); border: 1px solid var(--border);
    }

    .card-poster {
      width: 100%; height: 100%; object-fit: cover;
      background: var(--surface2); display: block;
      transition: transform .3s ease;
    }
    .card:hover .card-poster { transform: scale(1.1); }

    .card-poster-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--surface2), var(--border));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }

    /* Gradient overlay on poster */
    .card-inner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 40%, transparent 100%);
      pointer-events: none;
    }

    /* Shimmer effect */
    .card-shimmer {
      position: absolute; inset: 0; z-index: 2; overflow: hidden;
      border-radius: var(--radius); pointer-events: none;
    }
    .card-shimmer::after {
      content: ''; position: absolute; top: -50%; left: 0;
      width: 60px; height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-200%) skewX(-12deg);
      opacity: 0; transition: opacity .3s;
    }
    .card:hover .card-shimmer::after {
      opacity: 1;
      animation: shimmer 1.2s ease-in-out;
    }
    @keyframes shimmer { 0%{transform:translateX(-200%) skewX(-12deg)} 100%{transform:translateX(400%) skewX(-12deg)} }

    /* Card info — revealed on hover */
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 10px 8px;
      transform: translateY(6px); opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
    }
    .card:hover .card-info { transform: translateY(0); opacity: 1; }

    .card-title {
      font-size: 0.78rem; font-weight: 700; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .card-meta { display: flex; align-items: center; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .card-year { font-size: 0.7rem; color: rgba(255,255,255,0.7); }
    .card-rating { font-size: 0.7rem; color: var(--star); display: flex; align-items: center; gap: 2px; }

    /* ── Load more ── */
    .load-more-wrap { text-align: center; padding: 20px 0 10px; }
    .btn-load {
      padding: 10px 30px; border-radius: 30px;
      background: var(--surface2); border: 1.5px solid var(--border);
      color: var(--text); font-size: 0.85rem; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: all .25s;
    }
    .btn-load:hover { background: var(--border); box-shadow: 0 0 12px hsla(257,80%,65%,0.2); }

    /* ── Skeleton ── */
    .skeleton { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .skeleton-card { background: var(--surface2); border-radius: var(--radius); aspect-ratio: 2/3; }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; padding-bottom: 24px;
      animation: slideUp .25s ease-out;
      border: 1px solid var(--border);
      border-bottom: none;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-backdrop {
      width: 100%; height: 200px; object-fit: cover;
      border-radius: 20px 20px 0 0; display: block;
      background: var(--surface2);
    }
    .modal-backdrop-placeholder {
      width: 100%; height: 140px; border-radius: 20px 20px 0 0;
      background: linear-gradient(135deg, var(--surface2), var(--border));
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: hsla(257, 40%, 4%, 0.7); backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: #fff; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 10;
      transition: background .2s;
    }
    .modal-close:hover { background: var(--primary); }
    .modal-body { padding: 16px 18px 0; position: relative; }
    .modal-title {
      font-size: 1.15rem; font-weight: 800; line-height: 1.3; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
    }
    .badge.type-movie { background: hsla(257,80%,65%,0.15); color: var(--accent2); border-color: var(--accent2); }
    .badge.type-series { background: hsla(330,80%,65%,0.15); color: var(--pink); border-color: var(--pink); }
    .badge.type-anime { background: rgba(251,191,36,.12); color: var(--star); border-color: #d97706; }
    .modal-rating { color: var(--star); font-size: 0.85rem; font-weight: 700; }
    .modal-overview { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; }
    .modal-genres { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 18px; }

    /* ── CTA Button ── */
    .btn-watch {
      display: block; width: 100%;
      padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; font-size: 0.95rem; font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; text-align: center;
      transition: all .25s; letter-spacing: .3px;
      box-shadow: 0 4px 20px hsla(257,80%,65%,0.3);
    }
    .btn-watch:hover { box-shadow: 0 6px 28px hsla(257,80%,65%,0.5); transform: translateY(-1px); }
    .btn-watch:active { opacity: .85; transform: translateY(0); }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 30px;
      font-size: 0.85rem; z-index: 300; opacity: 0;
      transition: opacity .25s; white-space: nowrap; pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; }

    /* ── Episode list ── */
    .ep-season-title {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); margin: 14px 0 6px;
    }
    .ep-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
    .ep-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      color: var(--text); font-size: 0.85rem; cursor: pointer;
      font-family: 'Poppins', sans-serif;
      text-align: left; transition: all .2s;
    }
    .ep-btn:hover { background: var(--border); border-color: var(--primary); }
    .ep-btn:active { background: var(--border); }
    .ep-num {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: #fff;
      box-shadow: 0 0 10px hsla(257,80%,65%,0.3);
    }
    .ep-title { flex: 1; line-height: 1.3; }
  </style>
</head>
<body>  <!-- Libtl SDK loaded dynamically only for non-subscribers -->
  <script>
    window.addEventListener('load', function() {
      // Get user_id from Telegram WebApp
      const tgInit = window.Telegram?.WebApp?.initDataUnsafe;
      const userId = tgInit?.user?.id;
      if (!userId) return;

      // Check if user has active plan — skip ads if so
      fetch('/api/check-sub?user_id=' + userId)
        .then(r => r.json())
        .then(data => {
          if (data.is_active) return; // subscriber — no ads

          // Load Libtl SDK dynamically
          const s = document.createElement('script');
          s.src = '//libtl.com/sdk.js';
          s.setAttribute('data-zone', '10827850');
          s.setAttribute('data-sdk', 'show_10827850');
          document.head.appendChild(s);

          // Wait for SDK and show In-App Interstitial
          function tryInAppAd(retries) {
            if (typeof show_10827850 === 'function') {
              try {
                show_10827850({
                  type: 'inApp',
                  inAppSettings: {
                    frequency: 2,
                    capping: 0.1,
                    interval: 30,
                    timeout: 5,
                    everyPage: false
                  }
                });
              } catch(e) {}
            } else if (retries > 0) {
              setTimeout(() => tryInAppAd(retries - 1), 300);
            }
          }
          setTimeout(() => tryInAppAd(20), 500);
        })
        .catch(() => {}); // if check fails, no ads shown (safe default)
    });
  </script>
  <!-- Floating orbs background -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header>
    <div class="logo">🎬 CineStelar</div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Buscar películas, series, anime..." autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="movies">🎬 Películas</button>
      <button class="tab" data-tab="series">📺 Series</button>
      <button class="tab" data-tab="anime">🎌 Anime</button>
    </div>
  </header>

  <main>
    <div id="grid" class="grid"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn-load" id="loadMoreBtn">Cargar más</button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Telegram WebApp init ──────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let activeTab = 'movies';
    let currentPage = 0;
    let totalPages = 1;
    let isLoading = false;
    let searchQuery = '';
    let searchTimeout = null;
    let botUsername = 'CineStellar_Vip';

    const PLACEHOLDER = {
      movies: '🎬',
      series: '📺',
      anime: '🎌',
    };

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        botUsername = cfg.bot_username || botUsername;
      } catch (_) {}
      await loadContent(true);
    }

    // ── Load content ──────────────────────────────────────────────────────────
    async function loadContent(reset = false) {
      if (isLoading) return;
      if (reset) { currentPage = 0; totalPages = 1; }

      isLoading = true;
      if (reset) renderSkeletons();

      const params = new URLSearchParams({ page: currentPage });
      if (searchQuery) params.set('search', searchQuery);

      const endpoint = `/api/${activeTab}?${params}`;
      try {
        const data = await fetch(endpoint).then(r => r.json());
        if (reset) clearGrid();
        appendCards(data.items, activeTab);
        totalPages = data.pages || 1;
        currentPage = data.page + 1;
        document.getElementById('loadMoreWrap').style.display =
          (currentPage < totalPages && !searchQuery) ? 'block' : 'none';
        if (data.items.length === 0 && reset) renderEmpty();
      } catch (e) {
        if (reset) renderError();
      } finally {
        isLoading = false;
      }
    }

    // ── Render helpers ────────────────────────────────────────────────────────
    function clearGrid() {
      document.getElementById('grid').innerHTML = '';
    }

    function renderSkeletons() {
      const grid = document.getElementById('grid');
      grid.innerHTML = Array(8).fill(0).map(() =>
        `<div class="skeleton-card skeleton"></div>`
      ).join('');
    }

    function renderEmpty() {
      const grid = document.getElementById('grid');
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <span>${PLACEHOLDER[activeTab]}</span>
        ${searchQuery ? `No se encontraron resultados para "<b>${esc(searchQuery)}</b>"` : 'No hay contenido en esta categoría todavía.'}
      </div>`;
    }

    function renderError() {
      const grid = document.getElementById('grid');
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <span>⚠️</span>Error al cargar el catálogo. Intenta de nuevo.</div>`;
    }

    function appendCards(items, tab) {
      const grid = document.getElementById('grid');
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = item.id;
        card.dataset.type = item.type || tab.replace(/s$/, '');
        const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)}` : '';
        const year = item.year ? `<span class="card-year">${item.year}</span>` : '';
        const posterHtml = item.poster_url
          ? `<img class="card-poster" src="${esc(item.poster_url)}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentNode.replaceChild(makePlaceholder('${PLACEHOLDER[tab]}'),this)">`
          : `<div class="card-poster-placeholder">${PLACEHOLDER[tab]}</div>`;
        card.innerHTML = `
          <div class="card-inner">
            ${posterHtml}
            <div class="card-shimmer"></div>
            <div class="card-info">
              <div class="card-title">${esc(item.title)}</div>
              <div class="card-meta">
                ${year}
                ${rating ? `<span class="card-rating">${rating}</span>` : ''}
              </div>
            </div>
          </div>`;
        card.addEventListener('click', () => openDetail(item.id, item.type || determineType(tab)));
        grid.appendChild(card);
      });
    }

    function makePlaceholder(emoji) {
      const d = document.createElement('div');
      d.className = 'card-poster-placeholder';
      d.textContent = emoji;
      return d;
    }

    function determineType(tab) {
      return tab === 'movies' ? 'movie' : tab === 'series' ? 'series' : 'anime';
    }

    // ── Detail modal ──────────────────────────────────────────────────────────
    async function openDetail(id, type) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      overlay.classList.add('open');
      content.innerHTML = `<div style="padding:60px 20px;text-align:center"><div class="spinner"></div></div>`;

      try {
        const endpoint = type === 'movie' ? `/api/movie/${id}` : `/api/show/${id}`;
        const item = await fetch(endpoint).then(r => r.json());

        if (type === 'movie') {
          renderMovieModal(item, id);
        } else {
          // Fetch episodes alongside detail
          const epsData = await fetch(`/api/show/${id}/episodes`).then(r => r.json());
          renderShowModal(item, id, type, epsData.seasons || []);
        }
      } catch {
        content.innerHTML = `<div class="empty"><span>⚠️</span>Error al cargar detalles.</div>`;
      }
    }

    function renderMovieModal(item, id) {
      const content = document.getElementById('modalContent');
      const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)} / 10` : '';
      const runtime = item.runtime ? ` · ${item.runtime} min` : '';
      const deepLink = `https://t.me/${esc(botUsername)}?start=watch_movie_${id}`;

      const backdropHtml = item.backdrop_url
        ? `<img class="modal-backdrop" src="${esc(item.backdrop_url)}" alt="" onerror="this.outerHTML='<div class=modal-backdrop-placeholder>🎬</div>'">`
        : `<div class="modal-backdrop-placeholder">🎬</div>`;

      content.innerHTML = `
        <div style="position:relative">
          ${backdropHtml}
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-title">${esc(item.title)}</div>
          ${item.original_title && item.original_title !== item.title
            ? `<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:6px">${esc(item.original_title)}</div>` : ''}
          <div class="modal-meta">
            <span class="badge type-movie">🎬 Película</span>
            ${item.year ? `<span class="badge">${esc(item.year)}</span>` : ''}
            ${rating ? `<span class="modal-rating">${rating}${runtime}</span>` : ''}
          </div>
          ${item.genres ? `<div class="modal-genres">🏷️ ${esc(item.genres)}</div>` : ''}
          ${item.overview
            ? `<div class="modal-overview">${esc(item.overview)}</div>`
            : `<div class="modal-overview">Sin descripción disponible.</div>`}
          <button class="btn-watch" onclick="openInBot('${esc(deepLink)}')">▶️ Ver Película</button>
        </div>`;

      document.getElementById('modalClose').addEventListener('click', closeModal);
    }

    function renderShowModal(item, id, type, seasons) {
      const content = document.getElementById('modalContent');
      const emoji = type === 'anime' ? '🎌' : '📺';
      const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)} / 10` : '';
      const badgeClass = type === 'anime' ? 'type-anime' : 'type-series';
      const badgeLabel = type === 'anime' ? '🎌 Anime' : '📺 Serie';

      const backdropHtml = item.backdrop_url
        ? `<img class="modal-backdrop" src="${esc(item.backdrop_url)}" alt="" onerror="this.outerHTML='<div class=modal-backdrop-placeholder>${emoji}</div>'">`
        : `<div class="modal-backdrop-placeholder">${emoji}</div>`;

      // Build episode list HTML
      let epListHtml = '';
      if (seasons.length === 0) {
        epListHtml = `<div style="color:var(--text-muted);font-size:.85rem;padding:12px 0">Aún no hay episodios disponibles.</div>`;
      } else {
        seasons.forEach(s => {
          epListHtml += `<div class="ep-season-title">Temporada ${s.season}</div><div class="ep-list">`;
          s.episodes.forEach(ep => {
            const deepLink = `https://t.me/${esc(botUsername)}?start=watch_ep_${ep.id}`;
            epListHtml += `
              <button class="ep-btn" onclick="openInBot('${esc(deepLink)}')">
                <span class="ep-num">${ep.episode_number}</span>
                <span class="ep-title">${esc(ep.title)}</span>
              </button>`;
          });
          epListHtml += `</div>`;
        });
      }

      content.innerHTML = `
        <div style="position:relative">
          ${backdropHtml}
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-title">${esc(item.title)}</div>
          <div class="modal-meta">
            <span class="badge ${badgeClass}">${badgeLabel}</span>
            ${item.year ? `<span class="badge">${esc(item.year)}</span>` : ''}
            ${rating ? `<span class="modal-rating">${rating}</span>` : ''}
          </div>
          ${item.genres ? `<div class="modal-genres">🏷️ ${esc(item.genres)}</div>` : ''}
          ${epListHtml}
        </div>`;

      document.getElementById('modalClose').addEventListener('click', closeModal);
    }

    function openInBot(link) {
      if (tg) {
        tg.openTelegramLink(link);
      } else {
        window.open(link, '_blank');
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === activeTab && !searchQuery) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').style.display = 'none';
        loadContent(true);
      });
    });

    // ── Search ────────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      const val = e.target.value.trim();
      document.getElementById('searchClear').style.display = val ? 'block' : 'none';
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = val;
        loadContent(true);
      }, 380);
    });

    document.getElementById('searchClear').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').style.display = 'none';
      searchQuery = '';
      loadContent(true);
    });

    // ── Load more ─────────────────────────────────────────────────────────────
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      loadContent(false);
    });

    // ── Modal close on overlay click ──────────────────────────────────────────
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
