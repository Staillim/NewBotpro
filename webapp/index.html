<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TodoCineHD – Catálogo</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --surface: #161628;
      --surface2: #1e1e35;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --pink: #ec4899;
      --text: #f1f0ff;
      --text-muted: #9ca3af;
      --card-bg: #1a1a30;
      --border: #2d2d4e;
      --star: #fbbf24;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, #0d0d1a 80%, transparent);
      padding: 14px 16px 0;
    }
    .logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 10px 40px 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 0.9rem; outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent2); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.1rem; display: none; line-height: 1;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; padding-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 8px 18px; border-radius: 30px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--pink));
      border-color: transparent; color: #fff;
    }

    /* ── Main content ── */
    main { padding: 0 12px 100px; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      padding-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s;
      border: 1px solid var(--border);
    }
    .card:active { transform: scale(0.97); }
    .card-poster {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: var(--surface2); display: block;
    }
    .card-poster-placeholder {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(135deg, var(--surface2), var(--border));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .card-info { padding: 8px 8px 10px; }
    .card-title {
      font-size: 0.78rem; font-weight: 600; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      color: var(--text);
    }
    .card-meta { display: flex; align-items: center; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .card-year { font-size: 0.7rem; color: var(--text-muted); }
    .card-rating { font-size: 0.7rem; color: var(--star); display: flex; align-items: center; gap: 2px; }

    /* ── Load more ── */
    .load-more-wrap { text-align: center; padding: 20px 0 10px; }
    .btn-load {
      padding: 10px 30px; border-radius: 30px;
      background: var(--surface2); border: 1.5px solid var(--border);
      color: var(--text); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-load:hover { background: var(--border); }

    /* ── Skeleton ── */
    .skeleton { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .skeleton-card { background: var(--surface2); border-radius: var(--radius); height: 220px; }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; padding-bottom: 24px;
      animation: slideUp .25s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-backdrop {
      width: 100%; height: 200px; object-fit: cover;
      border-radius: 20px 20px 0 0; display: block;
      background: var(--surface2);
    }
    .modal-backdrop-placeholder {
      width: 100%; height: 140px; border-radius: 20px 20px 0 0;
      background: linear-gradient(135deg, var(--surface2), var(--border));
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none;
      color: #fff; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .modal-body { padding: 16px 18px 0; position: relative; }
    .modal-title { font-size: 1.15rem; font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
    }
    .badge.type-movie { background: rgba(124,58,237,.2); color: var(--accent2); border-color: var(--accent); }
    .badge.type-series { background: rgba(236,72,153,.2); color: var(--pink); border-color: var(--pink); }
    .badge.type-anime { background: rgba(251,191,36,.15); color: var(--star); border-color: #d97706; }
    .modal-rating { color: var(--star); font-size: 0.85rem; font-weight: 700; }
    .modal-overview { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; }
    .modal-genres { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 18px; }

    /* ── CTA Button ── */
    .btn-watch {
      display: block; width: 100%;
      padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: opacity .2s; letter-spacing: .3px;
    }
    .btn-watch:active { opacity: .85; }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 30px;
      font-size: 0.85rem; z-index: 300; opacity: 0;
      transition: opacity .25s; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

  <header>
    <div class="logo">🎬 TodoCineHD</div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Buscar películas, series, anime..." autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="movies">🎬 Películas</button>
      <button class="tab" data-tab="series">📺 Series</button>
      <button class="tab" data-tab="anime">🎌 Anime</button>
    </div>
  </header>

  <main>
    <div id="grid" class="grid"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn-load" id="loadMoreBtn">Cargar más</button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Telegram WebApp init ──────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let activeTab = 'movies';
    let currentPage = 0;
    let totalPages = 1;
    let isLoading = false;
    let searchQuery = '';
    let searchTimeout = null;
    let botUsername = 'CineStellar_Vip';

    const PLACEHOLDER = {
      movies: '🎬',
      series: '📺',
      anime: '🎌',
    };

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        botUsername = cfg.bot_username || botUsername;
      } catch (_) {}
      await loadContent(true);
    }

    // ── Load content ──────────────────────────────────────────────────────────
    async function loadContent(reset = false) {
      if (isLoading) return;
      if (reset) { currentPage = 0; totalPages = 1; }

      isLoading = true;
      if (reset) renderSkeletons();

      const params = new URLSearchParams({ page: currentPage });
      if (searchQuery) params.set('search', searchQuery);

      const endpoint = `/api/${activeTab}?${params}`;
      try {
        const data = await fetch(endpoint).then(r => r.json());
        if (reset) clearGrid();
        appendCards(data.items, activeTab);
        totalPages = data.pages || 1;
        currentPage = data.page + 1;
        document.getElementById('loadMoreWrap').style.display =
          (currentPage < totalPages && !searchQuery) ? 'block' : 'none';
        if (data.items.length === 0 && reset) renderEmpty();
      } catch (e) {
        if (reset) renderError();
      } finally {
        isLoading = false;
      }
    }

    // ── Render helpers ────────────────────────────────────────────────────────
    function clearGrid() {
      document.getElementById('grid').innerHTML = '';
    }

    function renderSkeletons() {
      const grid = document.getElementById('grid');
      grid.innerHTML = Array(8).fill(0).map(() =>
        `<div class="skeleton-card skeleton"></div>`
      ).join('');
    }

    function renderEmpty() {
      const grid = document.getElementById('grid');
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <span>${PLACEHOLDER[activeTab]}</span>
        ${searchQuery ? `No se encontraron resultados para "<b>${esc(searchQuery)}</b>"` : 'No hay contenido en esta categoría todavía.'}
      </div>`;
    }

    function renderError() {
      const grid = document.getElementById('grid');
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <span>⚠️</span>Error al cargar el catálogo. Intenta de nuevo.</div>`;
    }

    function appendCards(items, tab) {
      const grid = document.getElementById('grid');
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = item.id;
        card.dataset.type = item.type || tab.replace(/s$/, '');
        const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)}` : '';
        const year = item.year ? `<span class="card-year">${item.year}</span>` : '';
        const posterHtml = item.poster_url
          ? `<img class="card-poster" src="${esc(item.poster_url)}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentNode.replaceChild(makePlaceholder('${PLACEHOLDER[tab]}'),this)">`
          : `<div class="card-poster-placeholder">${PLACEHOLDER[tab]}</div>`;
        card.innerHTML = `
          ${posterHtml}
          <div class="card-info">
            <div class="card-title">${esc(item.title)}</div>
            <div class="card-meta">
              ${year}
              ${rating ? `<span class="card-rating">${rating}</span>` : ''}
            </div>
          </div>`;
        card.addEventListener('click', () => openDetail(item.id, item.type || determineType(tab)));
        grid.appendChild(card);
      });
    }

    function makePlaceholder(emoji) {
      const d = document.createElement('div');
      d.className = 'card-poster-placeholder';
      d.textContent = emoji;
      return d;
    }

    function determineType(tab) {
      return tab === 'movies' ? 'movie' : tab === 'series' ? 'series' : 'anime';
    }

    // ── Detail modal ──────────────────────────────────────────────────────────
    async function openDetail(id, type) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      overlay.classList.add('open');
      content.innerHTML = `<div style="padding:60px 20px;text-align:center"><div class="spinner"></div></div>`;

      try {
        const endpoint = type === 'movie' ? `/api/movie/${id}` : `/api/show/${id}`;
        const item = await fetch(endpoint).then(r => r.json());
        renderModal(item, id, type);
      } catch {
        content.innerHTML = `<div class="empty"><span>⚠️</span>Error al cargar detalles.</div>`;
      }
    }

    function renderModal(item, id, type) {
      const content = document.getElementById('modalContent');
      const badgeClass = `type-${type}`;
      const badgeLabel = type === 'movie' ? '🎬 Película' : type === 'series' ? '📺 Serie' : '🎌 Anime';
      const rating = item.vote_average ? `⭐ ${item.vote_average.toFixed(1)} / 10` : '';
      const runtime = item.runtime ? ` · ${item.runtime} min` : '';
      const seasons = item.seasons ? ` · ${item.seasons} temporada${item.seasons !== 1 ? 's' : ''}` : '';

      const backdropHtml = item.backdrop_url
        ? `<img class="modal-backdrop" src="${esc(item.backdrop_url)}" alt="" onerror="this.outerHTML='<div class=modal-backdrop-placeholder>${type==='movie'?'🎬':type==='series'?'📺':'🎌'}</div>'">`
        : `<div class="modal-backdrop-placeholder">${type === 'movie' ? '🎬' : type === 'series' ? '📺' : '🎌'}</div>`;

      const deepLink = `https://t.me/${esc(botUsername)}?start=watch_${type}_${id}`;
      const btnLabel = type === 'movie' ? '▶️ Ver en el Bot' : '📂 Ver en el Bot';

      content.innerHTML = `
        <div style="position:relative">
          ${backdropHtml}
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-title">${esc(item.title)}</div>
          ${item.original_title && item.original_title !== item.title
            ? `<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:6px">${esc(item.original_title)}</div>` : ''}
          <div class="modal-meta">
            <span class="badge ${badgeClass}">${badgeLabel}</span>
            ${item.year ? `<span class="badge">${esc(item.year)}</span>` : ''}
            ${rating ? `<span class="modal-rating">${rating}${runtime}${seasons}</span>` : ''}
          </div>
          ${item.genres ? `<div class="modal-genres">🏷️ ${esc(item.genres)}</div>` : ''}
          ${item.overview
            ? `<div class="modal-overview">${esc(item.overview)}</div>`
            : `<div class="modal-overview">Sin descripción disponible.</div>`}
          <button class="btn-watch" onclick="openInBot('${esc(deepLink)}')">
            ${btnLabel}
          </button>
        </div>`;

      document.getElementById('modalClose').addEventListener('click', closeModal);
    }

    function openInBot(link) {
      if (tg) {
        tg.openTelegramLink(link);
      } else {
        window.open(link, '_blank');
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === activeTab && !searchQuery) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').style.display = 'none';
        loadContent(true);
      });
    });

    // ── Search ────────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      const val = e.target.value.trim();
      document.getElementById('searchClear').style.display = val ? 'block' : 'none';
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = val;
        loadContent(true);
      }, 380);
    });

    document.getElementById('searchClear').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').style.display = 'none';
      searchQuery = '';
      loadContent(true);
    });

    // ── Load more ─────────────────────────────────────────────────────────────
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      loadContent(false);
    });

    // ── Modal close on overlay click ──────────────────────────────────────────
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
